services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: interviewdb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api-service:
    build: ./api-service
    ports:
      - "8080:8080"
    environment:
      DB_URL: postgres://admin:admin123@postgres:5432/interviewdb?sslmode=disable
      REDIS_URL: redis:6379
      JWT_SECRET: secret-key-dev
    depends_on:
      - postgres
      - redis

  worker-service:
    build: ./worker-service
    environment:
      DB_URL: postgres://admin:admin123@postgres:5432/interviewdb?sslmode=disable
      REDIS_URL: redis:6379
      GEMINI_API_KEY: your-api-key
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-service

volumes:
  pg_data: