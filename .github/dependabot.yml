version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"

  # Go modules
  - package-ecosystem: "gomod"
    directory: "/api-service"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "go"

  # npm
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "npm"
