name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test: 
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: interviewdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run migrations
        working-directory: ./api-service
        env:
          DB_URL: postgres://admin:admin123@localhost:5432/interviewdb?sslmode=disable
        run: |
          go mod tidy
          go run cmd/migrate/main.go

      - name: Run tests
        working-directory: ./api-service
        env:
          DB_URL: postgres://admin:admin123@localhost:5432/interviewdb?sslmode=disable
          REDIS_URL: localhost:6379
        run: |
          go test ./internal/handlers/... -v